name: CI

on:
  push:
    branches: ['main', 'refactor']
  pull_request:
    branches: ['main', 'refactor']

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify Dependency Guardrails
        run: npm run verify-dependencies

      - name: Verify Architecture
        run: npm run verify-architecture
        env:
          AGENT_MODE: true

      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key

      - name: Supabase Local Bootstrap + DB Tests (pgTAP)
        run: npm run db:local:test

      - name: Build
        run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 150

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Bootstrap local Supabase
        run: npm run db:local:bootstrap

      - name: Seed test user
        run: node scripts/seed-e2e.js

      - name: Run E2E tests
        timeout-minutes: 120
        run: npm run test:e2e:release
        env:
          CI: true

      - name: Run Vision-Enhanced E2E tests
        timeout-minutes: 30
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CI: true
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "Skipping vision E2E: GEMINI_API_KEY is not configured"
            exit 0
          fi

          npm run test:e2e:vision

      - name: Upload E2E report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-report
          path: |
            e2e-report.json
            playwright-report/
            test-results/
