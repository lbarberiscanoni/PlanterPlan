name: CI

on:
  push:
    branches: ['main', 'refactor']
  pull_request:
    branches: ['main', 'refactor']

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify Dependency Guardrails
        run: npm run verify-dependencies

      - name: Verify Architecture
        run: npm run verify-architecture
        env:
          AGENT_MODE: true

      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key

      - name: Supabase Local Bootstrap + DB Tests (pgTAP)
        run: npm run db:local:test

      - name: Build
        run: npm run build
