      - "Task focus broadcast: useTaskFocusBroadcast (250ms debounce) in TaskDetailsPanel updates the same presence channel with focusedTaskId. TaskItem accepts presentUsers prop (threaded Project → MilestoneSection → TaskItem) and renders a chip at the row's right edge when any peer's focusedTaskId === task.id. Single channel, two consumers — no second channel for focus"
