    wave_35_highlights:
      - "New table public.ics_feed_tokens (migration docs/db/migrations/2026_04_18_ics_tokens.sql) — per-user opaque-token rows with project_filter uuid[], revoked_at (soft revocation), last_accessed_at. RLS: SELECT/UPDATE/DELETE scoped to user_id = auth.uid(); admin allowed for SELECT/DELETE. INSERT WITH CHECK enforces self-ownership. Indexes on (token) for the public lookup and (user_id) for per-user listings"
      - "Public edge function supabase/functions/ics-feed/ (index.ts + ics.ts + README.md). GET /functions/v1/ics-feed?token=<opaque> returns text/calendar (RFC 5545 VCALENDAR). Token IS the credential; no Supabase auth header needed. 404 on revoked/unknown (indistinguishable — no info leak on rotation). Fire-and-forget UPDATE on last_accessed_at. Pure rendering logic in ics.ts so vitest drives it without the Deno runtime"
      - "ICS rendering spec: all-day VEVENT per task (DATE value type on DTSTART / DTEND; DTEND exclusive, +1 calendar day). VALARM action=DISPLAY trigger=-PT24H on every event. RFC 5545 §3.3.11 escaping (backslash / newline / comma / semicolon) and §3.1 75-octet line folding implemented in helpers (escapeIcsText / foldLine / formatIcsUtcStamp / formatIcsDate). Status mapping: completed → COMPLETED, blocked → CANCELLED, in_progress → IN-PROCESS, others → NEEDS-ACTION. 500-row limit on the task query"
      - "Client: planter.integrations.{listIcsFeedTokens, createIcsFeedToken, revokeIcsFeedToken}. createIcsFeedToken generates the token client-side via crypto.randomUUID() × 2 (256 bits). revokeIcsFeedToken is soft (sets revoked_at = now()). IcsFeedTokenRow + CreateIcsFeedTokenInput in src/shared/db/app.types.ts; database.types.ts hand-edited to include the new ics_feed_tokens shape"
