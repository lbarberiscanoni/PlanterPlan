      - "React 18.3.1 rollback (scope expansion): react, react-dom, react-is pinned exact to 18.3.1; @types/react on ^18.3.12; @types/react-dom on ^18.3.1. Unblocks Vercel preview deploys that were erroring under React 19 + --legacy-peer-deps. No React-19-only APIs in use (audited: no use(), useActionState, useFormStatus, server actions, ref-as-prop, built-in document metadata). .npmrc legacy-peer-deps=true retained for gantt-task-react@0.3.9 peer (^18)"
      - "Tests: +26 (82 files / 791 total). formatters.test.ts (Intl-based date/number/currency for en + es, null handling, relative-time formatting, invalid ISO). LocaleSwitcher.test.tsx (switch persists to localStorage, downstream consumer re-renders). en-json.test.ts (4 structural checks: namespace presence, no-empty, plural parity, interpolation). es-json.test.ts (5 structural checks: en parity with leaf-value type equality, _meta shape, no-empty, plural parity, interpolation + HTML tag preservation)"
      - "renderWithProviders test helper (Testing/test-utils/render-with-providers.tsx) wraps <QueryClientProvider> + <I18nextProvider> with eagerly-imported en.json. Every existing renderWithQueryClient call bulk-migrated BEFORE string extraction; no blind snapshot -u; zero it.skip. Existing test count from Wave 30 baseline (771) held before extension; Wave 31 net delta +20 = 791"
      - "Architecture SSoT: docs/architecture/i18n.md (Task 1) covers stack, file layout, namespace structure, date/number split, switching, adding-a-locale translator workflow. docs/architecture/date-engine.md appended with Wave 31 display-vs-math split"
    wave_30_highlights:
      - "Three new tables: notification_preferences (per-user singleton keyed on auth.users(id), bootstrap trigger trg_bootstrap_notification_prefs seeds a row on signup + backfill), notification_log (append-only audit; RLS denies INSERT/UPDATE/DELETE so only SECURITY DEFINER dispatchers write), push_subscriptions (one row per (user, browser endpoint) with UNIQUE constraint)"
      - "Four edge functions under supabase/functions/: existing supervisor-report (Wave 22) plus NEW dispatch-push (Task 2, VAPID via web-push@3.6.7), dispatch-notifications (Task 3, per-minute cron, drains mention_pending rows), overdue-digest (Task 3, daily cron with tz-aware Monday filter for weekly cadence). Pure dispatch loops factored into dispatch.ts files so vitest drives them without Deno.serve or esm.sh"
      - "Mention resolution: public.resolve_user_handles(text[]) SECURITY DEFINER RPC maps @-handles to auth.users uuids (email-prefix OR user_metadata.username match). CommentComposer awaits resolveMentions between extractMentions and the create mutation; on RPC error passes handles through verbatim (trigger's uuid-regex guard drops non-uuid entries silently — preserves Wave 26 test contract)"
      - "Dispatch state machine: mention_pending → mention_processing → mention_sent | mention_failed | mention_skipped. Single-runner-wins via UPDATE...WHERE event_type=<previous_state> RETURNING — idempotent under overlapping cron ticks without distributed locks"
      - "Quiet hours: notification_preferences.quiet_hours_start/end (time in user's IANA timezone). inQuietHours helper in supabase/functions/_shared/notification-prefs.ts memoizes one Intl.DateTimeFormat per tz (Gemini review fix from Wave 30 Task 2). Wrap-across-midnight supported"
      - "Overdue digest: per-user email_overdue_digest ∈ 'off'/'daily'/'weekly'. Weekly cohort filtered to Monday-in-user-tz via Intl.DateTimeFormat({ weekday: 'short', timeZone }). Zero-overdue users get no email (reduces notification fatigue). renderOverdueDigestEmail pure helper in _shared/email.ts mirrors the Wave 22 renderSupervisorReportEmail pattern"
      - "Web Push: VAPID keys (VAPID_PRIVATE_KEY + VITE_VAPID_PUBLIC_KEY + VAPID_SUBJECT) server-only except the public key which ships to the client bundle. Service worker public/sw.js handles install/activate/push/notificationclick. Multi-device subscription tracking (Wave 30 Task 2 Gemini fix): useEffect matches DB rows to THIS browser's endpoint via pushManager.getSubscription(). dispatch-push DELETEs 410/404 endpoints and processes users + subscriptions in Promise.allSettled parallel"
      - "Settings → Notifications tab: per-event email/push toggles, overdue-digest cadence select, quiet hours (start/end + tz), recent-notifications transparency panel via useNotificationLog({ limit: 20 }). Humanized event-type labels and tz-formatted dates via @/shared/lib/date-engine"
      - "Cron intentionally NOT pg_cron: docs/operations/edge-function-schedules.md (NEW) is the SSoT for scheduling. Operator picks Supabase Dashboard → Scheduled Triggers (preferred), GitHub Actions cron, or external pinger. Every dispatcher is idempotent under any scheduler"
      - "Service worker JS exception: public/sw.js is the only non-TypeScript file in the tree (documented exception). TS conversion is not currently scheduled (the original PWA/workbox track was descoped during the post-Wave-31 roadmap renumber). Tracked in docs/dev-notes.md and CLAUDE.md Conventions"
      - ".npmrc legacy-peer-deps=true unbreaks Vercel preview deployments. gantt-task-react@0.3.9 has react@^18 peer; React 19 requires --legacy-peer-deps (local + GitHub Actions CI already used it). Every Vercel deployment since at least Wave 28 was in ERROR state without this — fixed as part of Wave 30 Task 3 PR"
      - "Architecture SSoT: docs/architecture/notifications.md (NEW) covers data model, triggers, transports, state machine, cron schedules, and user prefs. Cross-referenced from docs/AGENT_CONTEXT.md golden paths and spec.md §3.7"
      - "Tests: +30 (78 files / 771 total). comment-mentions.ts resolveMentions block (5 cases: empty, matched, RPC-error fallthrough, null-data fallthrough, all-null filter); dispatch-notifications state-machine (6 cases: empty, both-transports, pref_disabled skip, quiet_hours skip, push-only, no_transport fail, concurrent-tick idempotency); overdue-digest cadence matrix (4 cases: empty/off, daily, weekly Monday vs Tuesday in user tz, zero-overdue silent, no_email_address, send-failure log) + isMondayInTimezone (4 tz edge cases); renderOverdueDigestEmail (8 shape assertions)"
      - "Pointer flip: TaskComments.test.tsx gained a planterClient mock (new at-risk test per wave-testing-strategy.md §Wave 30) so CommentComposer's transitive planter import doesn't break the test at module load. Four preexisting lint errors from eslint-plugin-react-hooks@7's new react-hooks/set-state-in-effect rule (useTreeState, PeopleList, useSettings) suppressed inline with tracking comments — refactoring deferred to a future cleanup wave"
