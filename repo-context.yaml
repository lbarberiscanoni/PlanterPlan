      - "i18next@^23.16.8 + react-i18next@^15.7.4 + i18next-browser-languagedetector@^8.2.1 framework. Provider tree wires <I18nextProvider> between QueryClientProvider and AuthProvider in src/app/App.tsx. Locale detector order: localStorage (key 'planterplan.locale') → navigator.language → 'en' fallback"
      - "LocaleSwitcher (src/features/settings/components/LocaleSwitcher.tsx) mounted in Settings → Profile as a new row. SUPPORTED_LOCALES = [{ code: 'en', label: 'English' }, { code: 'es', label: 'Español' }]"
      - "Intl-based formatters in src/shared/i18n/formatters.ts (formatDateLocalized / formatNumberLocalized / formatCurrencyLocalized) with per-locale DateTimeFormat cache. Internal date math stays UTC-anchored ISO in src/shared/lib/date-engine (no conflation)"
